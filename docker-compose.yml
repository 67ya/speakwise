version: '3.8'

services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build:
      context: ./eng-learn
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=english_learn;User=root;Password=${MYSQL_ROOT_PASSWORD};
      - ConnectionStrings__Redis=redis:6379
      - Ai__BaseUrl=${AI_BASE_URL}
      - Ai__ApiKey=${AI_API_KEY}
      - Ai__Model=${AI_MODEL:-gpt-4o}
      - Cors__AllowedOrigins__0=http://13.55.100.227
      - Cors__AllowedOrigins__1=http://localhost:3000
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: english_learn
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
